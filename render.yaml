services:
  - type: web
    name: chat-app-frontend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://chat-app-backend-rd95.onrender.com
      - key: REACT_APP_SOCKET_URL
        value: https://chat-app-backend-rd95.onrender.com
